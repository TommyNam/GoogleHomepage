<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="style.css">
</head>


<header>
    <div class="header-left">
        <a href="https://about.google/?fg=1&utm_source=google-US&utm_medium=referral&utm_campaign=hp-header">About</a>
        <a
            href="https://store.google.com/us/?utm_source=hp_header&utm_medium=google_ooo&utm_campaign=GS100042&hl=en-US">Store</a>
    </div>

    <div class="header-right">
        <a href="https://mail.google.com/mail/&ogbl">Gmail</a>
        <a href="https://www.google.com/imghp?hl=en&ogbl">Images</a>
        <div class="icon-apps">
            <img src="img/app_launcher.png" alt="Google Apps" class="apps" id="app-launcher">
        </div>

        <a href="https://accounts.google.com/" class="sign-in-link">
            <button class="sign-in-btn">Sign in</button>
        </a>
    </div>
</header>



<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Google_2026_logo.svg/1920px-Google_2026_logo.svg.png"
            alt="Google Logo" class="logo">

        <div class="search-box">
            <div class="search-input-wrapper">
                <img src="img/search_icon.png" alt="Search" class="search-icon">
                <input type="text" id="search-input" placeholder="Search Google or type a URL">
            </div>

            <div class="button-group">
                <button id="search-btn">Google Search</button>
                <button id="lucky-btn">I'm Feeling Lucky</button>
            </div>
        </div>


        <footer>
            <div class="footer-left">
                <a
                    href="https://business.google.com/us/google-ads/?subid=ww-ww-et-g-awa-a-g_hpafoot1_1!o2&utm_source=google.com&utm_medium=referral&utm_campaign=google_hpafooter&fg=1">Advertising</a>
                <a
                    href="https://www.google.com/search?q=Business&rlz=1C5OZZY_enUS1183US1183&sourceid=chrome&ie=UTF-8">Business</a>
                <a href="https://www.google.com/search/howsearchworks/?fg=1">How Search works</a>
            </div>

            <div class="footer-right">
                <a href="https://policies.google.com/privacy?hl=en&fg=1">Privacy</a>
                <a href="https://policies.google.com/terms?hl=en&fg=1">Terms</a>
                <a href="" id="settings-link">Settings</a>
            </div>
        </footer>


        <script src="script.js"></script>
</body>

</html>
